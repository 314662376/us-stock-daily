name: Daily US Stock Email

# 定时执行，每天北京时间 5 点（UTC 21:00）
on:
  schedule:
    - cron: '0 21 * * *'
  workflow_dispatch:  # 添加这个，确保有“Run workflow”按钮

jobs:
  send_email:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true  # 解决 Node.js 20 弃用问题
      EMAIL: ${{ secrets.EMAIL }}
      PASSWORD: ${{ secrets.EMAIL_PASSWORD }}
      API_KEY: ${{ secrets.API_KEY }}
    steps:
      # 1️⃣ 拉取仓库代码
      - uses: actions/checkout@v3

      # 2️⃣ 设置 Python 环境
      - uses: actions/setup-python@v4
        with:
          python-version: "3.11"

      # 3️⃣ 安装依赖
      - run: pip install --upgrade pip
      - run: pip install requests

      # 4️⃣ 执行 Python 脚本
      - run: python main.py
